name: E2E Tests

# Disabled until Helm chart and real e2e scenarios are implemented.
# Current scaffold tests require cert-manager and a Docker image build
# that aren't needed for InferCost's architecture.
# Re-enable when charts/infercost/ exists and e2e tests cover
# CostProfile reconciliation and API endpoints.
on:
  workflow_dispatch: # Manual trigger only for now

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e
