{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "infercost.fullname" . }}-manager-rolebinding
  labels:
    {{- include "infercost.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "infercost.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "infercost.serviceAccountName" . }}
  namespace: {{ include "infercost.namespace" . }}
{{- end }}
