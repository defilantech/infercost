# Default values for infercost.

# Namespace to deploy the controller
namespace: infercost-system

# Controller manager configuration
controllerManager:
  image:
    repository: ghcr.io/defilantech/infercost
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
    # Image digest (sha256:...) - takes precedence over tag when set.
    digest: ""

  replicaCount: 1

  leaderElection:
    enabled: true

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: []

# DCGM Exporter configuration (NVIDIA hosts)
dcgm:
  # DCGM exporter metrics endpoint URL.
  # Set to the DCGM exporter service in your cluster.
  # If empty, falls back to TDP-based power estimation from CostProfile spec.
  endpoint: ""
  # Examples:
  #   In-cluster: http://nvidia-dcgm-exporter.gpu-operator-resources.svc:9400/metrics
  #   NodePort:   http://<node-ip>:30940/metrics

# LLMKube Metal Agent configuration (Apple Silicon hosts)
# Apple Silicon has no DCGM equivalent; InferCost reads SoC power from the
# LLMKube Metal Agent's apple_power_combined_watts gauge. Required for
# real-time $/MTok on M-series Macs. CostProfiles with an Apple gpuModel
# automatically use this endpoint when set; NVIDIA profiles continue to
# use --dcgm-endpoint.
metal:
  # LLMKube Metal Agent /metrics endpoint URL.
  # If empty, Apple-hardware CostProfiles fall back to TDP-based estimation.
  endpoint: ""
  # Examples:
  #   Mac on the LAN: http://my-mac.local:9090/metrics
  #   Tailscale:      http://100.64.0.10:9090/metrics
  # Setup: install the LLMKube Metal Agent with --apple-power-enabled and the
  # NOPASSWD sudoers entry from deployment/macos/sudoers.d/llmkube-powermetrics.

# REST API configuration
api:
  # Enable the InferCost REST API server
  enabled: true
  # Port for the API server
  port: 8092
  # Service type for the API
  service:
    type: ClusterIP
    annotations: {}

# Metrics configuration
metrics:
  enabled: true
  secure: false
  service:
    type: ClusterIP
    port: 8090
    annotations: {}
    # For external access (e.g. cross-cluster Prometheus scraping):
    # type: NodePort
    # nodePort: 30090

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC configuration
rbac:
  create: true

# Install CRDs with the chart
installCRDs: true

# Cloud pricing override. The controller ships with an embedded list-price
# catalog (config/pricing/cloud-pricing.yaml), verified on the date stamped
# in that file. Enable this block to replace list prices with your negotiated
# rates — essential for honest comparisons in enterprise deployments where
# committed-use discounts are the norm.
pricing:
  override:
    # Mount a ConfigMap at /etc/infercost/pricing.yaml and pass --pricing-file
    # to the controller.
    enabled: false
    # Inline YAML for the override. Must follow the same schema as
    # config/pricing/cloud-pricing.yaml (lastVerified, sources, providers).
    # If empty, the chart ships its bundled copy of the default catalog as a
    # starting template that operators can then edit in place.
    inline: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Image pull secrets for private registries
imagePullSecrets: []

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Prometheus monitoring integration
prometheus:
  # PodMonitor scrapes the controller pod directly.
  # Default-on because it's the recommended path for kube-prometheus-stack users —
  # no Service required, works out of the box. The template is guarded by an
  # APIVersions check so clusters without prometheus-operator CRDs are unaffected.
  podMonitor:
    enabled: true
    namespace: ""
    interval: 30s
    labels: {}
    relabelings: []
    metricRelabelings: []

  # ServiceMonitor is an alternative for users who prefer Service-based scraping
  # or run a prometheus-operator setup that only consumes ServiceMonitors.
  # Leave one of podMonitor or serviceMonitor enabled, not both.
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    labels: {}
