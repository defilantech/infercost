---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - finops.infercost.ai
  resources:
  - costprofiles
  - tokenbudgets
  - usagereports
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - finops.infercost.ai
  resources:
  - costprofiles/finalizers
  - tokenbudgets/finalizers
  - usagereports/finalizers
  verbs:
  - update
- apiGroups:
  - finops.infercost.ai
  resources:
  - costprofiles/status
  - tokenbudgets/status
  - usagereports/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - monitoring.coreos.com
  resources:
  - prometheusrules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
