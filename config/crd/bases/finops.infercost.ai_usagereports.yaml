---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: usagereports.finops.infercost.ai
spec:
  group: finops.infercost.ai
  names:
    kind: UsageReport
    listKind: UsageReportList
    plural: usagereports
    singular: usagereport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.period
      name: Period
      type: string
    - format: float
      jsonPath: .status.estimatedCostUSD
      name: Cost ($)
      type: number
    - format: float
      jsonPath: .status.costPerMillionTokens
      name: $/MTok
      type: number
    - jsonPath: .status.inputTokens
      name: Input Tokens
      type: integer
    - jsonPath: .status.outputTokens
      name: Output Tokens
      type: integer
    - format: float
      jsonPath: .status.gpuEfficiencyRatio
      name: GPU Efficiency
      type: number
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          UsageReport contains computed cost data for a time period. The controller populates
          the status with cost attribution, cloud comparison, and efficiency metrics.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UsageReportSpec defines the desired configuration for a UsageReport.
            properties:
              costProfileRef:
                description: costProfileRef is the name of the CostProfile to use
                  for cost computation.
                minLength: 1
                type: string
              namespaces:
                description: namespaces limits the report to specific namespaces.
                  If omitted, all namespaces are included.
                items:
                  type: string
                type: array
              schedule:
                default: daily
                description: schedule defines how often the report is regenerated.
                enum:
                - daily
                - weekly
                - monthly
                type: string
            required:
            - costProfileRef
            type: object
          status:
            description: UsageReportStatus contains the computed cost report data.
              Populated by the controller.
            properties:
              byModel:
                description: byModel contains per-model cost breakdowns.
                items:
                  description: ModelCostBreakdown contains cost attribution for a
                    single model.
                  properties:
                    costPerMillionTokens:
                      description: costPerMillionTokens is the effective cost per
                        million tokens for this model.
                      type: number
                    estimatedCostUSD:
                      description: estimatedCostUSD is the computed cost for this
                        model.
                      type: number
                    inputTokens:
                      description: inputTokens is the total input/prompt tokens processed.
                      format: int64
                      type: integer
                    model:
                      description: model is the model name or identifier.
                      type: string
                    namespace:
                      description: namespace is the namespace where the model runs.
                      type: string
                    outputTokens:
                      description: outputTokens is the total output/completion tokens
                        generated.
                      format: int64
                      type: integer
                  required:
                  - costPerMillionTokens
                  - estimatedCostUSD
                  - inputTokens
                  - model
                  - namespace
                  - outputTokens
                  type: object
                type: array
              byNamespace:
                description: byNamespace contains per-namespace (team) cost breakdowns.
                items:
                  description: NamespaceCostBreakdown contains cost attribution for
                    a single namespace (team).
                  properties:
                    estimatedCostUSD:
                      description: estimatedCostUSD is the computed cost for this
                        namespace.
                      type: number
                    namespace:
                      description: namespace is the Kubernetes namespace.
                      type: string
                    tokenCount:
                      description: tokenCount is the total tokens (input + output)
                        for this namespace.
                      format: int64
                      type: integer
                  required:
                  - estimatedCostUSD
                  - namespace
                  - tokenCount
                  type: object
                type: array
              cloudComparison:
                description: cloudComparison contains cost comparisons against cloud
                  providers.
                items:
                  description: CloudComparisonEntry compares on-prem cost to a specific
                    cloud provider.
                  properties:
                    estimatedCloudCostUSD:
                      description: estimatedCloudCostUSD is what the same tokens would
                        have cost on this provider.
                      type: number
                    model:
                      description: model is the comparable cloud model (e.g. "gpt-4o",
                        "claude-sonnet-4-5").
                      type: string
                    provider:
                      description: provider is the cloud provider name (e.g. "OpenAI",
                        "Anthropic", "Google").
                      type: string
                    savingsPercent:
                      description: savingsPercent is the percentage saved vs. cloud
                        (0-100).
                      type: number
                    savingsUSD:
                      description: savingsUSD is the difference (cloud cost - on-prem
                        cost). Positive means on-prem is cheaper.
                      type: number
                  required:
                  - estimatedCloudCostUSD
                  - model
                  - provider
                  - savingsPercent
                  - savingsUSD
                  type: object
                type: array
              conditions:
                description: conditions represent the current state of the UsageReport.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              costPerMillionTokens:
                description: costPerMillionTokens is the effective blended cost per
                  million tokens.
                type: number
              estimatedCostUSD:
                description: estimatedCostUSD is the total computed on-prem cost for
                  the period.
                type: number
              gpuEfficiencyRatio:
                description: gpuEfficiencyRatio is the fraction of GPU time spent
                  on active inference (0.0-1.0).
                type: number
              inputTokens:
                description: inputTokens is the total input/prompt tokens across all
                  models.
                format: int64
                type: integer
              lastUpdated:
                description: lastUpdated is the timestamp of the last report computation.
                format: date-time
                type: string
              outputTokens:
                description: outputTokens is the total output/completion tokens across
                  all models.
                format: int64
                type: integer
              period:
                description: period is the time period covered by this report (e.g.
                  "2026-03", "2026-03-20").
                type: string
              periodEnd:
                description: periodEnd is the end time of the reporting period.
                format: date-time
                type: string
              periodStart:
                description: periodStart is the start time of the reporting period.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
