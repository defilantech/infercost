              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TokenBudgetSpec defines the desired budget configuration.
            properties:
              alertThresholds:
                description: alertThresholds defines percentage-based alert trigger
                  points.
                items:
                  description: AlertThreshold defines a budget alert trigger point.
                  properties:
